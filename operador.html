<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Operador — Projeto OP Fluortech</title>
  <link rel="stylesheet" href="estilo.css">
  <link rel="stylesheet" href="operador.css">
</head>
<body>

  <header class="cabecalho">
    <h1>Projeto OP — Operador</h1>
    <span class="ambiente" id="ambiente">ambiente de teste</span>
  </header>

  <main class="conteudo">

    <!-- TELA A: LISTA DE OPs -->
    <section id="tela-lista">
      <h2 class="titulo-operador">Ordens de Produção ativas</h2>
      <p class="subtitulo-operador">Selecione a OP indicada pelo líder da sua área.</p>
      <div id="lista-ops" class="lista-ops"></div>
      <p id="lista-vazia" class="lista-vazia" style="display:none;">
        Nenhuma Ordem de Produção ativa no momento.
      </p>
    </section>

    <!-- TELA B: OP ABERTA -->
    <section id="tela-op" style="display:none;">
      <button id="btn-voltar" class="botao-voltar">← Voltar para a lista</button>
      <div id="ficha-op"></div>
    </section>

  </main>

  <footer class="rodape">
    <small>Sistema interno de acompanhamento de Ordens de Produção</small>
  </footer>

  <!-- JANELA DE CONFIRMAÇÃO (modal do site) -->
  <div id="modal-confirmar" class="modal-fundo" style="display:none;">
    <div class="modal-caixa">
      <p id="modal-texto" class="modal-texto"></p>
      <div class="modal-botoes">
        <button id="modal-cancelar" class="modal-btn-cancelar">Cancelar</button>
        <button id="modal-confirmar-btn" class="modal-btn-confirmar">Confirmar</button>
      </div>
    </div>
  </div>

  <script type="module" src="operador.js"></script>

</body>
</html>
